apiVersion: rbac.authorization.k8s.io/v1
kind: Role                          # was ClusterRole — now namespace-scoped
metadata:
  name: jenkins
  namespace: jenkins
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/exec
      - pods/log
      - services
      - endpoints
      - configmaps
      - secrets
      - persistentvolumeclaims
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]

  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding                   # was ClusterRoleBinding
metadata:
  name: jenkins
  namespace: jenkins
subjects:
  - kind: ServiceAccount
    name: jenkins
    namespace: jenkins
roleRef:
  kind: Role                        # was ClusterRole
  name: jenkins
  apiGroup: rbac.authorization.k8s.io
